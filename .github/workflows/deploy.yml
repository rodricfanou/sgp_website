name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Prerender and prepare output
        run: |
          mkdir -p _site
          # Start preview server in background
          npx vite preview --port 4174 &
          PID=$!
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:4174/ 2>/dev/null; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          # Prerender each route
          for route in "/" "/property-owners" "/corporate-housing" "/services" "/about" "/properties" "/contact"; do
            dir="_site$route"
            [ "$route" = "/" ] && dir="_site"
            mkdir -p "$dir"
            curl -s "http://localhost:4174$route" > "$dir/index.html"
            echo "Prerendered $route"
          done
          kill $PID 2>/dev/null || true
          # Copy client assets
          cp -r dist/client/* _site/
          # 404 for SPA fallback
          cp _site/index.html _site/404.html
          # CNAME for custom domain
          echo "summitglobalproperty.com" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
